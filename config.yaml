# OneMil Scanner Configuration

# Logging
log_level: INFO

# Scanner thresholds
scanner:
  # Price range filter
  price_min: 2.0
  price_max: 20.0

  # Float filter (shares)
  float_max: 10_000_000

  # Pre-market gap threshold
  gap_pct_min: 2.0

  # Intraday move threshold
  intraday_change_pct_min: 10.0

  # Relative volume threshold (0 = disabled)
  # 15-month backtest showed rvol filtering HURTS performance:
  #   no_rvol: $247K, Sharpe 3.72 | cumulative 5x: $170K, Sharpe 2.89 | bucket 5x: $104K, Sharpe 2.01
  relative_volume_min: 0

  # Volume profile lookback days
  volume_profile_days: 50

# Timing
timing:
  # Pre-market polling interval (seconds)
  premarket_poll_interval: 60

  # Intraday scan interval (minutes) - aligned to 15-min buckets
  intraday_scan_interval: 15

  # Market hours (Eastern Time)
  premarket_start: "04:00"
  market_open: "09:30"
  market_close: "16:00"

# Database
database:
  path: data/onemil.db

# Float caching
float_cache:
  # Refresh float data if older than N days
  refresh_days: 7

# News analyzer (optional - requires ANTHROPIC_API_KEY in .env)
news_analyzer:
  model: claude-haiku-4-5-20251001

# Telegram notifications
notifications:
  telegram:
    enabled: true
    send_on_startup: true
    send_on_qualified: true
    send_on_pattern: true
    send_on_trade: true
    send_on_close: true
    send_daily_report: true

# Trading (Phase 2 - automated paper trading)
trading:
  enabled: false
  sizing_mode: fixed_risk
  risk_per_trade: 2000
  position_size_dollars: 50000
  max_shares: 10000
  max_positions: 3
  daily_loss_limit: -2000.0
  min_risk_pct: 0.005
  max_risk_pct: 0.05
  min_risk_reward: 2.5
  min_price: 2.00
  last_entry_time: "15:00"      # ET — no new entries after this
  force_close_time: "15:45"     # ET — close all positions
  setup_expiry_bars: 10         # cancel pending buy-stop after N bars
  pattern_poll_interval: 60
  skip_midday: true
  circuit_breaker_dd: 1500.0
  circuit_breaker_pause: 1
  market_regime:
    enabled: true
    spy_5d_return_min: -2.0    # skip trading when SPY 5d return below this %
  bull_flag:
    min_pole_candles: 3
    min_pole_gain_pct: 3.0
    max_retracement_pct: 50.0
    max_pullback_candles: 5
    min_breakout_volume_ratio: 1.5
    require_macd_positive: false
