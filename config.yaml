# OneMil Scanner Configuration

# Logging
log_level: INFO

# Scanner thresholds
scanner:
  # Price range filter
  price_min: 2.0
  price_max: 20.0

  # Float filter (shares)
  float_max: 10_000_000

  # Pre-market gap threshold
  gap_pct_min: 2.0

  # Intraday move threshold
  intraday_change_pct_min: 10.0

  # Relative volume threshold (bucket vol / avg bucket vol)
  relative_volume_min: 5.0

  # Volume profile lookback days
  volume_profile_days: 50

# Timing
timing:
  # Pre-market polling interval (seconds)
  premarket_poll_interval: 60

  # Intraday scan interval (minutes) - aligned to 15-min buckets
  intraday_scan_interval: 15

  # Market hours (Eastern Time)
  premarket_start: "04:00"
  market_open: "09:30"
  market_close: "16:00"

# Database
database:
  path: data/onemil.db

# Float caching
float_cache:
  # Refresh float data if older than N days
  refresh_days: 7

# News analyzer (optional - requires ANTHROPIC_API_KEY in .env)
news_analyzer:
  model: claude-haiku-4-5-20251001

# Telegram notifications
notifications:
  telegram:
    enabled: true
    send_on_startup: true
    send_on_qualified: true
    send_on_pattern: true
    send_on_trade: true
    send_on_close: true
    send_daily_report: true

# Trading (Phase 2 - automated paper trading)
trading:
  enabled: false
  position_size_dollars: 10000
  max_shares: 10000
  max_positions: 3
  daily_loss_limit: -100.0
  max_risk_per_share: 0.20
  min_risk_reward: 2.0
  pattern_poll_interval: 60
  stop_trading_before_close_min: 15
  bull_flag:
    min_pole_candles: 3
    min_pole_gain_pct: 3.0
    max_retracement_pct: 50.0
    max_pullback_candles: 5
    min_breakout_volume_ratio: 1.5
